<!DOCTYPE html>
<html>

<head>
<title>Tokuma Hotel Booking</title>
<link rel="stylesheet" href="css/style.css">
</head>


<body>


<header>

<h1>Tokuma Hotel Booking</h1>

</header>


<section>


<form id="bookingForm">


<label>
Full Name
</label>

<input type="text" id="name" required>


<label>
Phone Number
</label>

<input type="tel" id="phone" required>


<label>
Choose Room
</label>

<select id="room">

<option>
Standard Room - 1000 ETB
</option>

</select>


<label>
Check In Date
</label>

<input type="date" id="checkin" required>


<label>
Check Out Date
</label>

<input type="date" id="checkout" required>


<button class="button" type="submit">
Send Booking
</button>


</form>


</section>


<script src="js/app.js"></script>

</body>

</html>
